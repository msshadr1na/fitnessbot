<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помещение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Russo One', sans-serif; min-height: 100vh; color: #1f1f35; }
        .bg-gradient { position: fixed; inset: 0; background: linear-gradient(127.42deg, #CBBAFD 9.38%, #CBE949 58.67%); z-index: -1; }
        .container { width: 100%; max-width: 375px; margin: 0 auto; padding: 20px 14px 24px; min-height: 100vh; }
        .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .back-btn {
            border: none;
            background: #CBE949;
            width: 50px;
            height: 50px;
            border-radius: 18px;
            font-size: 30px;
            font-family: inherit;
            cursor: pointer;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 7px 0 rgba(64, 52, 96, 0.22), 0 10px 18px rgba(26, 15, 52, 0.18);
        }
        .page-label {
            font-size: 16px;
            letter-spacing: 0.6px;
            opacity: 0.75;
            text-align: right;
            flex: 1;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .panel { background: #EFEEFC; border-radius: 20px; border: 1px solid #fff; box-shadow: 0 12px 20px rgba(37,27,76,.15); padding: 18px; }
        input { width: 100%; height: 56px; border-radius: 16px; border: 1px solid #ddd; padding: 0 12px; font-family: inherit; margin-bottom: 8px; }
        .btn { width: 100%; height: 56px; border: none; border-radius: 16px; font-family: inherit; cursor: pointer; margin-top: 10px; box-shadow: 0 7px 0 rgba(57,42,103,.18), 0 12px 18px rgba(57,42,103,.12); }
        .btn:active { transform: translateY(4px); box-shadow: 0 3px 0 rgba(57,42,103,.18), 0 8px 10px rgba(57,42,103,.12); }
        .status { min-height: 20px; margin-top: 10px; font-size: 12px; color: #5a5a5a; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal {
            width: 90%;
            max-width: 360px;
            background: #D9D9D9;
            border-radius: 20px;
            padding: 28px 18px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .modal-title { font-size: 18px; text-transform: uppercase; text-align: center; }
        .modal-btn {
            width: 220px;
            height: 48px;
            border: none;
            border-radius: 18px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .modal-btn--delete { background: #F8CECC; box-shadow: 0 6px 0 #C5928F; }
        .modal-btn--cancel { background: #CBE949; box-shadow: 0 6px 0 #A3B83A; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="topbar">
            <button class="back-btn" id="back-btn">←</button>
            <div class="page-label">ПОМЕЩЕНИЕ</div>
        </div>
        <div class="panel">
            <input id="name-input" maxlength="100" placeholder="Название помещения">
            <button class="btn" style="background:#CBBAFD;" id="save-btn">Сохранить название</button>
            <button class="btn" style="background:#F8CECC;" id="delete-btn">Удалить помещение</button>
            <div class="status" id="status"></div>
        </div>
    </div>
    <div class="modal-overlay" id="delete-modal">
        <div class="modal">
            <div class="modal-title">Подтвердите удаление</div>
            <button class="modal-btn modal-btn--delete" id="confirm-delete-btn">Удалить</button>
            <button class="modal-btn modal-btn--cancel" id="cancel-delete-btn">Отмена</button>
        </div>
    </div>
    <script>
        Telegram.WebApp.ready();
        const params = new URLSearchParams(window.location.search);
        const orgId = params.get("org_id");
        const placeId = params.get("place_id");
        const input = document.getElementById("name-input");
        const statusEl = document.getElementById("status");
        const deleteModal = document.getElementById("delete-modal");
        const deleteBtn = document.getElementById("delete-btn");

        function setStatus(text, isError = false) {
            statusEl.textContent = text || "";
            statusEl.style.color = isError ? "#d32f2f" : "#5a5a5a";

        }

        async function loadPlace() {
            const res = await fetch(`/api/v1/org/${orgId}/places/${placeId}`);
            const data = await res.json();
            if (!res.ok) return setStatus(data.detail || "Помещение не найдено", true);
            input.value = data.name || "";

            const placesRes = await fetch(`/api/v1/org/${orgId}/places`);
            const placesData = await placesRes.json();
            const isOnlyPlace = (placesData.places || []).length <= 1;
            if (isOnlyPlace) {
                deleteBtn.disabled = true;
                deleteBtn.style.opacity = "0.6";
                deleteBtn.style.cursor = "default";
                setStatus("Нельзя удалить единственное помещение организации", true);
            }
        }

        document.getElementById("save-btn").onclick = async () => {
            const name = input.value.trim();
            if (name.length < 2) return setStatus("Название должно быть не короче 2 символов", true);
            const res = await fetch(`/api/v1/org/${orgId}/places/${placeId}?name=${encodeURIComponent(name)}`, { method: "PUT" });
            const data = await res.json();
            if (!res.ok) return setStatus(data.detail || "Не удалось сохранить", true);
            setStatus("Название обновлено");
        };

        deleteBtn.onclick = () => {
            if (deleteBtn.disabled) return;
            deleteModal.classList.add("active");
        };
        document.getElementById("cancel-delete-btn").onclick = () => {
            deleteModal.classList.remove("active");
        };
        deleteModal.onclick = (e) => {
            if (e.target === deleteModal) {
                deleteModal.classList.remove("active");
            }
        };
        document.getElementById("confirm-delete-btn").onclick = async () => {
            deleteModal.classList.remove("active");
            const res = await fetch(`/api/v1/org/${orgId}/places/${placeId}`, { method: "DELETE" });
            if (res.ok) {
                window.location.href = `/app/org_places.html?org_id=${orgId}&v=2`;
            } else {
                const data = await res.json();
                setStatus(data.detail || "Не удалось удалить помещение", true);
            }
        };

        document.getElementById("back-btn").onclick = () => {
            window.location.href = `/app/org_places.html?org_id=${orgId}&v=2`;
        };

        loadPlace();
    </script>
</body>
</html>
